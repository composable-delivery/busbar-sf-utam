name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast checks (no compilation) ──────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Lint ──────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Tests with coverage ───────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Run doc tests
        run: cargo test --workspace --doc

      - name: Fix coverage paths
        run: |
          # cargo-llvm-cov emits absolute CI runner paths in the LCOV file.
          # Codecov needs repo-relative paths to match source files.
          sed -i "s|$PWD/||g" lcov.info
          echo "Source files in report:"
          grep '^SF:' lcov.info | head -20

      - name: Generate summary
        if: always()
        run: |
          echo "### Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only 2>&1 | tail -20 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Live driver tests (WebDriver + CDP) ───────────────────────────────
  live-driver-tests:
    name: Live Driver Tests (${{ matrix.driver }})
    runs-on: ubuntu-latest
    # Live tests require a real browser and external services; only run on
    # workflow_dispatch (manual trigger) so they don't block PR checks.
    if: github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          - driver: webdriver
            features: ""
            ignored_pattern: "webdriver"
            setup: |
              # Install Chrome and ChromeDriver for WebDriver tests
              wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
              echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
                | sudo tee /etc/apt/sources.list.d/google-chrome.list
              sudo apt-get update -q
              sudo apt-get install -y google-chrome-stable
              CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
              # Install matching chromedriver
              wget -q "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
              unzip -q chromedriver-linux64.zip
              sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
              chromedriver --version
              # Start chromedriver in background
              chromedriver --port=9515 &
              sleep 2

          - driver: cdp
            features: "--features cdp"
            ignored_pattern: "cdp"
            setup: |
              # Install Chrome for CDP tests (no ChromeDriver needed)
              wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
              echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
                | sudo tee /etc/apt/sources.list.d/google-chrome.list
              sudo apt-get update -q
              sudo apt-get install -y google-chrome-stable
              google-chrome --version

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set up browser (${{ matrix.driver }})
        run: ${{ matrix.setup }}

      - name: Run live driver tests (${{ matrix.driver }})
        run: |
          cargo test -p utam-core ${{ matrix.features }} \
            --test live_driver_tests \
            -- --ignored ${{ matrix.ignored_pattern }}

      - name: Summarize results
        if: always()
        run: |
          echo "### Live Driver Tests: ${{ matrix.driver }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Driver: \`${{ matrix.driver }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Documentation ─────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ── MSRV ──────────────────────────────────────────────────────────────
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  # ── Security audit ────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Generate lockfile
        run: cargo generate-lockfile
      - name: Security audit
        run: cargo audit
