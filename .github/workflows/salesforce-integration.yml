name: Salesforce Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test name filter (e.g. 'test_sf_header' or empty for all)"
        required: false
        default: ""
  pull_request:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "utam-test/**"
      - "utam-core/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"
  push:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"

# contents: write needed to push to gh-pages branch
permissions:
  contents: write

concurrency:
  group: "pages-${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  salesforce-tests:
    name: Salesforce Live Tests
    runs-on: ubuntu-latest
    environment: salesforce

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build tests
        run: |
          cargo test -p utam-runtime --test salesforce_live --all-features --no-run
          cargo test -p utam-runtime --test compiled_page_objects --all-features --no-run
          cargo test -p utam-runtime --test dual_adapter --all-features --no-run

      # ── Xvfb + Chrome + video ─────────────────────────────────────────
      - name: Start Xvfb and chromedriver
        run: |
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq xvfb ffmpeg fluxbox > /dev/null 2>&1

          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1

          # Start a window manager so Chrome windows render properly
          DISPLAY=:99 fluxbox &
          sleep 1

          # Start chromedriver on the virtual display
          DISPLAY=:99 chromedriver --port=9515 &
          sleep 2
          curl -sf http://localhost:9515/status | jq .ready || echo "WARNING: chromedriver not ready"

      - name: Prepare allure results directory
        run: mkdir -p /tmp/allure-results

      # ── Run tests ────────────────────────────────────────────────────
      # Video recording starts AFTER auth (inside the test run step)
      # to avoid recording the frontdoor URL which contains credentials.
      - name: Run Salesforce integration tests
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
          CHROMEDRIVER_URL: "http://localhost:9515"
          ALLURE_RESULTS_DIR: "/tmp/allure-results"
          DISPLAY: ":99"
        run: |
          # Start video recording in background — waits for browser-ready signal
          # This ensures we never record the frontdoor URL (contains credentials)
          (
            # Wait for the test to signal that auth is complete
            for i in $(seq 1 120); do
              [ -f /tmp/allure-results/browser-ready ] && break
              sleep 1
            done
            rm -f /tmp/allure-results/browser-ready
            echo "Starting video recording (auth complete)"
            DISPLAY=:99 ffmpeg -y -f x11grab -video_size 1920x1080 -framerate 10 \
              -i :99.0 -c:v libx264 -preset ultrafast -crf 25 -pix_fmt yuv420p \
              /tmp/allure-results/screencast.mp4 </dev/null 2>/tmp/ffmpeg.log
          ) &
          echo $! > /tmp/ffmpeg.pid

          FILTER="${{ inputs.test_filter }}"

          # Run with WebDriver adapter (default, stable)
          # CDP adapter has a clone_handle stale element issue — tracked in #86
          # --test-threads=1 so the single browser session is used serially.
          echo "=== Salesforce Live Tests (WebDriver) ==="
          if [ -n "$FILTER" ]; then
            cargo test -p utam-runtime --test salesforce_live --all-features -- "$FILTER" --nocapture --test-threads=1 2>&1
          else
            cargo test -p utam-runtime --test salesforce_live --all-features -- --nocapture --test-threads=1 2>&1
          fi

      - name: Compiled page object tests
        if: always()
        run: cargo test -p utam-runtime --test compiled_page_objects --all-features -- --nocapture 2>&1

      # Run dual adapter tests separately (experimental, non-blocking)
      - name: Dual adapter tests (WebDriver + CDP)
        if: always()
        continue-on-error: true
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
          CHROMEDRIVER_URL: "http://localhost:9515"
          DISPLAY: ":99"
        run: |
          echo "=== Dual Adapter Tests ==="
          cargo test -p utam-runtime --test dual_adapter --all-features -- --nocapture 2>&1 || true

      # ── Stop recording + attach video ─────────────────────────────────
      - name: Stop recording and attach video
        if: always()
        run: |
          if [ -f /tmp/ffmpeg.pid ]; then
            kill -INT "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || true
            for i in $(seq 1 10); do
              kill -0 "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || break
              sleep 1
            done
            kill -9 "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || true
          fi

          VIDEO="/tmp/allure-results/screencast.mp4"
          if [ -f "$VIDEO" ] && [ -s "$VIDEO" ]; then
            SIZE=$(du -h "$VIDEO" | cut -f1)
            echo "Video recorded: $SIZE"
            # Attach video to ALL Allure result files
            for RESULT_FILE in /tmp/allure-results/*-result.json; do
              [ -f "$RESULT_FILE" ] || continue
              jq '.attachments += [{"name": "Screencast", "source": "screencast.mp4", "type": "video/mp4"}]' \
                "$RESULT_FILE" > "${RESULT_FILE}.tmp" && mv "${RESULT_FILE}.tmp" "$RESULT_FILE"
            done
            echo "Video attached to $(ls /tmp/allure-results/*-result.json 2>/dev/null | wc -l) Allure results"
          else
            echo "WARNING: No video recorded"
            cat /tmp/ffmpeg.log 2>/dev/null || true
          fi

      # ── Generate Allure report ────────────────────────────────────────
      - name: Generate Allure report
        id: allure
        if: always()
        run: |
          npm install -g allure-commandline

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          BRANCH_DIR=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch_dir=$BRANCH_DIR" >> "$GITHUB_OUTPUT"

          # Fetch previous history from gh-pages for trend tracking
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages 2>/dev/null; then
            # Extract the entire history/ directory from the previous report
            mkdir -p /tmp/prev-report
            git archive gh-pages -- "${BRANCH_DIR}/history" 2>/dev/null | tar -x -C /tmp/prev-report 2>/dev/null || true
            if [ -d "/tmp/prev-report/${BRANCH_DIR}/history" ]; then
              mkdir -p /tmp/allure-results/history
              cp -r "/tmp/prev-report/${BRANCH_DIR}/history/"* /tmp/allure-results/history/
              echo "Loaded previous history ($(ls /tmp/allure-results/history/ | wc -l) files)"
            else
              echo "No previous history found for branch ${BRANCH_DIR}"
            fi
          fi

          allure generate /tmp/allure-results -o /tmp/allure-report --clean
          echo "Report generated"

      # ── Deploy to GitHub Pages (push to gh-pages branch) ──────────────
      - name: Deploy to GitHub Pages
        if: always()
        run: |
          BRANCH_DIR="${{ steps.allure.outputs.branch_dir }}"
          [ -z "$BRANCH_DIR" ] && BRANCH_DIR="unknown"

          DEPLOY_DIR="/tmp/pages-deploy"
          mkdir -p "$DEPLOY_DIR"

          # Fetch existing Pages content
          if git rev-parse --verify gh-pages 2>/dev/null; then
            git archive gh-pages | tar -x -C "$DEPLOY_DIR" 2>/dev/null || true
          fi

          # Replace this branch's report
          rm -rf "$DEPLOY_DIR/${BRANCH_DIR}"
          mkdir -p "$DEPLOY_DIR/${BRANCH_DIR}"
          if [ -d /tmp/allure-report ]; then
            cp -r /tmp/allure-report/* "$DEPLOY_DIR/${BRANCH_DIR}/"
          fi

          # Create index page
          {
            echo '<!DOCTYPE html><html><head><title>Allure Reports — busbar-sf-utam</title>'
            echo '<style>'
            echo 'body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }'
            echo 'a { display: block; padding: 10px 16px; margin: 4px 0; background: #f6f8fa; border-radius: 6px; text-decoration: none; color: #0969da; }'
            echo 'a:hover { background: #ddf4ff; }'
            echo '.current { font-weight: bold; background: #ddf4ff; }'
            echo '</style></head><body>'
            echo '<h1>Salesforce Integration Test Reports</h1>'
            echo '<p>Each branch publishes its own Allure report with screenshots, video, and history.</p>'
            for dir in "$DEPLOY_DIR"/*/; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")
              CLASS=""
              [ "$name" = "$BRANCH_DIR" ] && CLASS=' class="current"'
              echo "<a href=\"${name}/index.html\"${CLASS}>${name}</a>"
            done
            echo "<hr><p><small>Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')</small></p>"
            echo '</body></html>'
          } > "$DEPLOY_DIR/index.html"

          # Push to gh-pages branch
          cd "$DEPLOY_DIR"
          git init
          git checkout -b gh-pages
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update Allure report for ${BRANCH_DIR}" --allow-empty
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages

      # ── Job Summary ──────────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          BRANCH_DIR="${{ steps.allure.outputs.branch_dir }}"
          [ -z "$BRANCH_DIR" ] && BRANCH_DIR="unknown"
          PAGES_URL="https://composable-delivery.github.io/busbar-sf-utam"

          {
            echo "## Salesforce Integration Tests"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Driver | Chrome on Xvfb (video recorded) |"
            echo "| Auth | busbar-sf-api (direct OAuth, no SF CLI) |"
            echo "| Allure Report | [View report](${PAGES_URL}/${BRANCH_DIR}/) |"
            echo "| All Reports | [Report index](${PAGES_URL}/) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
