name: Salesforce Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test name filter (e.g. 'test_sf_header' or empty for all)"
        required: false
        default: ""
  pull_request:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "utam-test/**"
      - "utam-core/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"
  push:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Job 1: Run tests, generate Allure report
  # ════════════════════════════════════════════════════════════════════════
  salesforce-tests:
    name: Salesforce Live Tests
    runs-on: ubuntu-latest
    environment: salesforce

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build tests
        run: cargo test -p utam-runtime --test salesforce_live --no-run

      # ── Salesforce CLI ────────────────────────────────────────────────
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth-url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth-url.txt --set-default --alias ci-org
          rm /tmp/sf-auth-url.txt

      - name: Get org info
        id: sf-org
        run: |
          ORG_INFO=$(sf org display --target-org ci-org --json)
          echo "$ORG_INFO" | jq '{ instanceUrl: .result.instanceUrl, username: .result.username }'
          INSTANCE=$(echo "$ORG_INFO" | jq -r '.result.instanceUrl')
          echo "instance_url=$INSTANCE" >> "$GITHUB_OUTPUT"

          FRONTDOOR_JSON=$(sf org open --url-only --target-org ci-org --json)
          FRONTDOOR=$(echo "$FRONTDOOR_JSON" | jq -r '.result.url')

          echo "frontdoor_url=$FRONTDOOR" >> "$GITHUB_OUTPUT"
          echo "Org instance: $INSTANCE"
          echo "Frontdoor length: ${#FRONTDOOR}"

      # ── Xvfb + Chrome + video ─────────────────────────────────────────
      - name: Start Xvfb and chromedriver
        run: |
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq xvfb ffmpeg > /dev/null 2>&1
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          DISPLAY=:99 chromedriver --port=9515 &
          sleep 2
          curl -sf http://localhost:9515/status | jq .ready || echo "WARNING: chromedriver not ready"

      - name: Start video recording
        run: |
          mkdir -p /tmp/allure-results
          DISPLAY=:99 ffmpeg -y -f x11grab -video_size 1920x1080 -framerate 10 \
            -i :99.0 -c:v libx264 -preset ultrafast -crf 25 -pix_fmt yuv420p \
            /tmp/allure-results/screencast.mp4 </dev/null 2>/tmp/ffmpeg.log &
          echo $! > /tmp/ffmpeg.pid
          sleep 1
          if kill -0 "$(cat /tmp/ffmpeg.pid)" 2>/dev/null; then
            echo "Recording started (PID $(cat /tmp/ffmpeg.pid))"
          else
            echo "WARNING: ffmpeg failed to start"
            cat /tmp/ffmpeg.log
          fi

      # ── Run tests ────────────────────────────────────────────────────
      - name: Run Salesforce integration tests
        env:
          SF_INSTANCE_URL: ${{ steps.sf-org.outputs.instance_url }}
          SF_FRONTDOOR_URL: ${{ steps.sf-org.outputs.frontdoor_url }}
          CHROMEDRIVER_URL: "http://localhost:9515"
          ALLURE_RESULTS_DIR: "/tmp/allure-results"
          DISPLAY: ":99"
        run: |
          FILTER="${{ inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            cargo test -p utam-runtime --test salesforce_live -- "$FILTER" --nocapture --test-threads=1 2>&1
          else
            cargo test -p utam-runtime --test salesforce_live -- --nocapture --test-threads=1 2>&1
          fi

      # ── Stop recording + attach video ─────────────────────────────────
      - name: Stop recording and attach video
        if: always()
        run: |
          if [ -f /tmp/ffmpeg.pid ]; then
            kill -INT "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || true
            for i in $(seq 1 10); do
              kill -0 "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || break
              sleep 1
            done
            kill -9 "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || true
          fi

          VIDEO="/tmp/allure-results/screencast.mp4"
          if [ -f "$VIDEO" ] && [ -s "$VIDEO" ]; then
            SIZE=$(du -h "$VIDEO" | cut -f1)
            echo "Video recorded: $SIZE"
            RESULT_FILE=$(ls /tmp/allure-results/*-result.json 2>/dev/null | head -1)
            if [ -n "$RESULT_FILE" ]; then
              jq '.attachments += [{"name": "Screencast", "source": "screencast.mp4", "type": "video/mp4"}]' \
                "$RESULT_FILE" > "${RESULT_FILE}.tmp" && mv "${RESULT_FILE}.tmp" "$RESULT_FILE"
              echo "Video attached to Allure result"
            fi
          else
            echo "WARNING: No video recorded"
            cat /tmp/ffmpeg.log 2>/dev/null || true
          fi

      # ── Generate Allure report ────────────────────────────────────────
      - name: Generate Allure report
        id: allure
        if: always()
        run: |
          npm install -g allure-commandline

          # Determine branch name
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          BRANCH_DIR=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch_dir=$BRANCH_DIR" >> "$GITHUB_OUTPUT"

          # Try to fetch previous history from gh-pages for trend tracking
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages 2>/dev/null; then
            HISTORY_SRC=$(git show "gh-pages:${BRANCH_DIR}/history/history.json" 2>/dev/null || true)
            if [ -n "$HISTORY_SRC" ]; then
              mkdir -p /tmp/allure-results/history
              # Extract all history files from the gh-pages branch
              git show "gh-pages:${BRANCH_DIR}/history/history.json" > /tmp/allure-results/history/history.json 2>/dev/null || true
              git show "gh-pages:${BRANCH_DIR}/history/history-trend.json" > /tmp/allure-results/history/history-trend.json 2>/dev/null || true
              echo "Loaded previous history"
            fi
          fi

          allure generate /tmp/allure-results -o /tmp/allure-report --clean
          echo "Report generated"

      # ── Prepare Pages content ─────────────────────────────────────────
      - name: Prepare Pages artifact
        if: always()
        run: |
          BRANCH_DIR="${{ steps.allure.outputs.branch_dir }}"
          [ -z "$BRANCH_DIR" ] && BRANCH_DIR="unknown"

          DEPLOY_DIR="/tmp/pages-deploy"
          mkdir -p "$DEPLOY_DIR"

          # Fetch existing Pages content from gh-pages branch
          if git rev-parse --verify gh-pages 2>/dev/null; then
            git archive gh-pages | tar -x -C "$DEPLOY_DIR" 2>/dev/null || true
          fi

          # Replace this branch's report
          rm -rf "$DEPLOY_DIR/${BRANCH_DIR}"
          mkdir -p "$DEPLOY_DIR/${BRANCH_DIR}"
          if [ -d /tmp/allure-report ]; then
            cp -r /tmp/allure-report/* "$DEPLOY_DIR/${BRANCH_DIR}/"
          fi

          # Create index page
          {
            echo '<!DOCTYPE html><html><head><title>Allure Reports — busbar-sf-utam</title>'
            echo '<style>'
            echo 'body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }'
            echo 'a { display: block; padding: 10px 16px; margin: 4px 0; background: #f6f8fa; border-radius: 6px; text-decoration: none; color: #0969da; }'
            echo 'a:hover { background: #ddf4ff; }'
            echo '.current { font-weight: bold; background: #ddf4ff; }'
            echo '</style></head><body>'
            echo '<h1>Salesforce Integration Test Reports</h1>'
            echo '<p>Each branch publishes its own Allure report with screenshots, video, and history.</p>'
            for dir in "$DEPLOY_DIR"/*/; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")
              CLASS=""
              [ "$name" = "$BRANCH_DIR" ] && CLASS=' class="current"'
              echo "<a href=\"${name}/index.html\"${CLASS}>${name}</a>"
            done
            echo "<hr><p><small>Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')</small></p>"
            echo '</body></html>'
          } > "$DEPLOY_DIR/index.html"

          echo "Pages content ready at $DEPLOY_DIR"
          ls -la "$DEPLOY_DIR/"

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-deploy

      # Also push to gh-pages branch as a data store for history
      - name: Update gh-pages data store
        if: always()
        continue-on-error: true
        run: |
          BRANCH_DIR="${{ steps.allure.outputs.branch_dir }}"
          [ -z "$BRANCH_DIR" ] && exit 0
          [ ! -d /tmp/pages-deploy ] && exit 0

          cd /tmp/pages-deploy
          git init
          git checkout -b gh-pages
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update report for ${BRANCH_DIR}" --allow-empty
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages 2>/dev/null || echo "gh-pages push failed (non-critical, Pages will still deploy)"

      # ── Job Summary ──────────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          BRANCH_DIR="${{ steps.allure.outputs.branch_dir }}"
          [ -z "$BRANCH_DIR" ] && BRANCH_DIR="unknown"
          PAGES_URL="https://composable-delivery.github.io/busbar-sf-utam"

          {
            echo "## Salesforce Integration Tests"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Org | \`${{ steps.sf-org.outputs.instance_url }}\` |"
            echo "| Driver | Chrome on Xvfb (video recorded) |"
            echo "| Allure Report | [View report](${PAGES_URL}/${BRANCH_DIR}/) |"
            echo "| All Reports | [Report index](${PAGES_URL}/) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════
  # Job 2: Deploy to GitHub Pages (requires separate job with pages env)
  # ════════════════════════════════════════════════════════════════════════
  deploy-report:
    name: Deploy Report
    needs: salesforce-tests
    if: always() && needs.salesforce-tests.result != 'cancelled'
    runs-on: ubuntu-latest
    continue-on-error: true

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
