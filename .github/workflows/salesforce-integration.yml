name: Salesforce Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test name filter (e.g. 'test_sf_header' or empty for all)"
        required: false
        default: ""
  pull_request:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "utam-test/**"
      - "utam-core/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"
  push:
    branches: [main]
    paths:
      - "utam-runtime/**"
      - "salesforce-pageobjects/**"
      - ".github/workflows/salesforce-integration.yml"

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  salesforce-tests:
    name: Salesforce Live Tests
    runs-on: ubuntu-latest
    environment: salesforce

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # ── Build first (so test step is fast) ────────────────────────────
      - name: Build tests
        run: cargo test -p utam-runtime --test salesforce_live --no-run

      # ── Salesforce CLI ────────────────────────────────────────────────
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth-url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth-url.txt --set-default --alias ci-org
          rm /tmp/sf-auth-url.txt

      - name: Get org info
        id: sf-org
        run: |
          ORG_INFO=$(sf org display --target-org ci-org --json)
          echo "$ORG_INFO" | jq '{ instanceUrl: .result.instanceUrl, username: .result.username }'

          INSTANCE=$(echo "$ORG_INFO" | jq -r '.result.instanceUrl')
          echo "instance_url=$INSTANCE" >> "$GITHUB_OUTPUT"

          FRONTDOOR_JSON=$(sf org open --url-only --target-org ci-org --json 2>/dev/null || true)
          FRONTDOOR=$(echo "$FRONTDOOR_JSON" | jq -r '.result.url // empty')

          if [ -z "$FRONTDOOR" ]; then
            ACCESS_TOKEN=$(echo "$ORG_INFO" | jq -r '.result.accessToken')
            FRONTDOOR="${INSTANCE}/secur/frontdoor.jsp?sid=${ACCESS_TOKEN}"
          fi

          echo "frontdoor_url=$FRONTDOOR" >> "$GITHUB_OUTPUT"
          echo "Org instance: $INSTANCE"

      # ── Video recording setup ─────────────────────────────────────────
      - name: Setup virtual display and video recording
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg > /dev/null 2>&1

          # Start a virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 1

          # Start recording the virtual display
          mkdir -p /tmp/sf-artifacts
          ffmpeg -f x11grab -video_size 1920x1080 -i :99 \
            -codec:v libx264 -preset ultrafast -pix_fmt yuv420p \
            -y /tmp/sf-artifacts/session.mp4 &
          echo $! > /tmp/ffmpeg.pid
          echo "Video recording started (PID: $(cat /tmp/ffmpeg.pid))"

      # ── Chrome + Chromedriver ─────────────────────────────────────────
      - name: Start chromedriver
        run: |
          google-chrome --version || true
          chromedriver --version || true
          chromedriver --port=9515 &
          sleep 2
          curl -sf http://localhost:9515/status | jq . || echo "WARNING: chromedriver status check failed"

      # ── Run Tests ────────────────────────────────────────────────────
      - name: Run Salesforce integration tests
        env:
          SF_INSTANCE_URL: ${{ steps.sf-org.outputs.instance_url }}
          SF_FRONTDOOR_URL: ${{ steps.sf-org.outputs.frontdoor_url }}
          CHROMEDRIVER_URL: "http://localhost:9515"
          # Use the virtual display instead of headless so video captures the browser
          DISPLAY: ":99"
        run: |
          echo "SF_INSTANCE_URL: $SF_INSTANCE_URL"
          echo "CHROMEDRIVER_URL: $CHROMEDRIVER_URL"

          FILTER="${{ inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            cargo test -p utam-runtime --test salesforce_live -- "$FILTER" --nocapture 2>&1
          else
            cargo test -p utam-runtime --test salesforce_live -- --nocapture 2>&1
          fi

      # ── Stop recording ───────────────────────────────────────────────
      - name: Stop video recording
        if: always()
        run: |
          if [ -f /tmp/ffmpeg.pid ]; then
            kill -INT "$(cat /tmp/ffmpeg.pid)" 2>/dev/null || true
            sleep 3
            # Verify the video was created
            if [ -f /tmp/sf-artifacts/session.mp4 ]; then
              echo "Video recorded: $(du -h /tmp/sf-artifacts/session.mp4 | cut -f1)"
            fi
          fi

      # ── Collect screenshots ──────────────────────────────────────────
      - name: Collect screenshots
        if: always()
        run: |
          cp /tmp/sf-screenshot*.png /tmp/sf-artifacts/ 2>/dev/null || true
          ls -lh /tmp/sf-artifacts/ 2>/dev/null || echo "No artifacts found"

      # ── Upload artifacts ──────────────────────────────────────────────
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-test-artifacts
          path: /tmp/sf-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      # ── Job Summary with inline screenshots ──────────────────────────
      - name: Generate summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## Salesforce Integration Tests

          | Detail | Value |
          |--------|-------|
          HEADER

          echo "| Org | ${{ steps.sf-org.outputs.instance_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Driver | chromedriver (WebDriver) |" >> "$GITHUB_STEP_SUMMARY"

          # Count screenshots
          SC_COUNT=$(ls /tmp/sf-artifacts/*.png 2>/dev/null | wc -l)
          echo "| Screenshots | ${SC_COUNT} captured |" >> "$GITHUB_STEP_SUMMARY"

          # Video info
          if [ -f /tmp/sf-artifacts/session.mp4 ]; then
            VID_SIZE=$(du -h /tmp/sf-artifacts/session.mp4 | cut -f1)
            echo "| Video | ${VID_SIZE} (see artifacts) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Embed screenshots inline (GitHub renders base64 images in summaries)
          for png in /tmp/sf-artifacts/*.png; do
            [ -f "$png" ] || continue
            BASENAME=$(basename "$png")
            echo "### ${BASENAME}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Click to expand</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            # GitHub step summary supports <img> with base64 src
            B64=$(base64 -w0 "$png")
            echo "<img src=\"data:image/png;base64,${B64}\" width=\"800\" />" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
